services:

  # ============================================
  # PostgreSQL Databases
  # ============================================
  postgres-users:
    image: postgres:16
    container_name: postgres-users
    restart: always
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-sales:
    image: postgres:16
    container_name: postgres-sales
    restart: always
    environment:
      POSTGRES_DB: sales
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - sales_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # RabbitMQ Broker
  # ============================================
  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: rabbitmq-broker
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ============================================
  # Eureka Discovery Server
  # ============================================
  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: eureka-server
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # API Gateway
  # ============================================
  api-gateway-server:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway-server
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "8040:8040"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8040
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8040/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ============================================
  # Users Service
  # ============================================
  users-service:
    build:
      context: ./users
      dockerfile: Dockerfile
    container_name: users-service
    depends_on:
      postgres-users:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8050:8080"
    environment:
      SPRING_APPLICATION_NAME: users-service
      SERVER_PORT: 8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-users:5432/users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # ============================================
  # Sales Service
  # ============================================
  sales-service:
    build:
      context: ./sales
      dockerfile: Dockerfile
    container_name: sales-service
    depends_on:
      postgres-sales:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8060:8080"
    environment:
      SPRING_APPLICATION_NAME: sales-service
      SERVER_PORT: 8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-sales:5432/sales
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # ============================================
  # Notification Service
  # ============================================
  notification-service:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8070:8070"
    environment:
      SPRING_APPLICATION_NAME: notification-service
      SERVER_PORT: 8070
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      SENDGRID_HOST: smtp.sendgrid.net
      SENDGRID_PORT: 587
      SENDGRID_USERNAME: apikey
      SENDGRID_PASSWORD: SENDGRID_PASSWORD
      MAIL_FROM: MAIL_FROM
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8070/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # ============================================
  # Media Service
  # ============================================
  media-service:
    build:
      context: ./media
      dockerfile: Dockerfile
    container_name: media-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      SPRING_APPLICATION_NAME: media-service
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      CLOUDINARY_CLOUD_NAME: CLOUDINARY_CLOUD_NAME
      CLOUDINARY_API_KEY: CLOUDINARY_API_KEY
      CLOUDINARY_API_SECRET: CLOUDINARY_API_SECRET
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # ============================================
  # AI Service
  # ============================================
  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: ai-service
    depends_on:
        discovery-server:
          condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      SPRING_APPLICATION_NAME: ai-service
      SERVER_PORT: 8090
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_REGISTER: true
      EUREKA_FETCH: true
      EUREKA_PREFER_IP: true
      OPENAI_BASE_URL: OPENAI_BASE_URL
      OPENAI_API_KEY: test
      OPENAI_MODEL: OPENAI_MODEL
      OPENAI_TEMPERATURE: 0.2
      OPENAI_MAX_TOKENS: 1000
      OPENAI_TOP_P: 0.9
      OPENAI_FREQUENCY_PENALTY: 0.0
      OPENAI_PRESENCE_PENALTY: 0.0
      # Gemini (opcional - comentado)
      # GEMINI_API_KEY: GEMINI_API_KEY
      # GEMINI_MODEL: gemini-2.5-flash
      # GEMINI_TEMPERATURE: 0.7
      # GEMINI_MAX_TOKENS: 2048
      LOG_LEVEL: INFO
      FEIGN_LOG_LEVEL: DEBUG
      SPRING_AI_LOG_LEVEL: DEBUG
      SPRINGDOC_API_DOCS_ENABLED: true
      SPRINGDOC_SWAGGER_UI_ENABLED: true
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge
    name: microservices-net

volumes:
  users_data:
    name: users_data
  sales_data:
    name: sales_data
  rabbitmq_data:
    name: rabbitmq_data
  rabbitmq_logs:
    name: rabbitmq_logs