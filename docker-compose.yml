services:
  postgres-users:
    image: postgres:16
    container_name: postgres-users
    restart: always
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    networks:
      - microservices-net

  postgres-sales:
    image: postgres:16
    container_name: postgres-sales
    restart: always
    environment:
      POSTGRES_DB: sales
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - sales_data:/var/lib/postgresql/data
    networks:
      - microservices-net

  users-service:
    build:
      context: ./users
      dockerfile: Dockerfile
    container_name: users-service
    depends_on:
      - postgres-users
    ports:
      - "8050:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres-users:5432/users
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
    networks:
      - microservices-net

  sales-service:
    build:
      context: ./sales
      dockerfile: Dockerfile
    container_name: sales-service
    depends_on:
      - postgres-sales
    ports:
      - "8060:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres-sales:5432/sales
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
    networks:
      - microservices-net

networks:
  microservices-net:

volumes:
  users_data:
  sales_data: