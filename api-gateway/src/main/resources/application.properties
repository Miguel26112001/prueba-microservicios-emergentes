# ============================================
# Spring Application Configuration
# ============================================
spring.application.name=api-gateway
server.port=${PORT:8040}

# ============================================
# Eureka Client Configuration
# ============================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# ============================================
# Gateway Discovery (CORREGIDO - sin server.webflux)
# ============================================
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# ============================================
# Routes
# ============================================
# Users Service Route
spring.cloud.gateway.server.webflux.routes[0].id=users-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://users-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

# Sales Service Route
spring.cloud.gateway.server.webflux.routes[1].id=sales-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://sales-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/sales/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

# ============================================
# Gateway Timeouts
# ============================================
spring.cloud.gateway.server.webflux.httpclient.connect-timeout=5000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=10s

# ============================================
# Management Endpoints
# ============================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.access=read_only
management.endpoint.health.show-details=always

# ============================================
# Logging Configuration
# ============================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.web.reactive=INFO
logging.level.com.netflix.discovery=INFO