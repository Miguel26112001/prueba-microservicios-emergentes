# ============================================
# Configuración Base
# ============================================
spring.application.name=${SPRING_APPLICATION_NAME:ai-service}
server.port=${SERVER_PORT:8090}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# ============================================
# Spring Boot Actuator
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.simple.metrics.export.enabled=true

# Info endpoint personalizado (git, build)
management.info.git.mode=full
info.app.name=${spring.application.name}
info.app.version=0.0.1-SNAPSHOT
info.app.java-version=${java.version}

# ============================================
# Eureka Client (Microservicios)
# ============================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=${EUREKA_REGISTER:true}
eureka.client.fetch-registry=${EUREKA_FETCH:true}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:true}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

