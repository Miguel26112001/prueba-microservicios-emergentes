# ============================================
# LM Studio (OpenAI compatible)
# ============================================
spring.ai.openai.base-url=${OPENAI_BASE_URL:http://127.0.0.1:1234}
spring.ai.openai.api-key=${OPENAI_API_KEY:test}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:qwen3-4b-instruct-2507}
spring.ai.openai.chat.options.temperature=${OPENAI_TEMPERATURE:0.2}

# Opciones adicionales de OpenAI
spring.ai.openai.chat.options.max-tokens=${OPENAI_MAX_TOKENS:1000}
spring.ai.openai.chat.options.top-p=${OPENAI_TOP_P:0.9}
spring.ai.openai.chat.options.frequency-penalty=${OPENAI_FREQUENCY_PENALTY:0.0}
spring.ai.openai.chat.options.presence-penalty=${OPENAI_PRESENCE_PENALTY:0.0}

# ============================================
# Logging Configuration
# ============================================
logging.level.com.example.ai=${LOG_LEVEL:INFO}
logging.level.org.springframework.cloud.openfeign=${FEIGN_LOG_LEVEL:DEBUG}
logging.level.org.springframework.ai=${SPRING_AI_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# ============================================
# Swagger / OpenAPI (springdoc)
# ============================================
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.packages-to-scan=com.example.ai
springdoc.paths-to-match=/api/**

# ============================================
# Thread Pools y Performance
# ============================================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000