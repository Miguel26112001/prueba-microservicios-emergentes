spring.application.name=Sales Service

# Base configuration
spring.datasource.driver-class-name=org.postgresql.Driver

# Database configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Spring Data JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database=PostgreSQL
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.example.sales.shared.infrastructure.documentation.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Application Information for Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# Server Configuration
server.port=${SERVER_PORT}
