# ============================================
# Spring Application Configuration
# ============================================
spring.application.name=sales-service
server.port=${SERVER_PORT:8080}

# ============================================
# Database Configuration
# ============================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/sales}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# ============================================
# JPA Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database=PostgreSQL
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=com.example.sales.shared.infrastructure.documentation.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# ============================================
# Eureka Client Configuration
# ============================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# ============================================
# RabbitMQ Configuration
# ============================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ============================================
# Management & Actuator
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.info.env.enabled=true

# ============================================
# Logging
# ============================================
logging.level.com.example.sales=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ============================================
# Documentation
# ============================================
documentation.application.description=@project.description@
documentation.application.version=@project.version@